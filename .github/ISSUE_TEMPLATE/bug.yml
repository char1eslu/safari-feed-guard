name: "🐞 Bug / 选择器失效"
description: Extension/service bug, or X DOM changed and detection broke.
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: 组件
      options: [extension, local service, central service, data/sync, other]
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: 现象 / 期望
      description: 发生了什么，期望什么。X 页面类型（主页/资料页/回复区）很有帮助。
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
  - type: input
    id: env
    attributes:
      label: 环境
      placeholder: "Chrome 版本 / OS / 扩展 commit"
