# Side-channel agent decision thresholds.
# Override at deploy time by editing the file at
#   ~/.hermes-jobs/x-spam-agent/policy.yaml
# on the runner host. run.py reads this every cycle; no restart needed.

# Minimum confidence for the agent to move an item to agent_blacklist.
# Higher = more conservative (more goes to agent_pending instead).
blacklist_conf_min: 0.90

# Minimum confidence for the agent to move an item to agent_whitelist.
# Whitelisting wrongly is harder to undo than blacklisting wrongly
# (it permanently lets a spammer through), so we keep this strict.
whitelist_conf_min: 0.85

# When the agent is unsure (A1/A2/A3 abort, or below thresholds), route to
# agent_pending instead of leaving the item in auto_pending_review. This
# surfaces it on a separate "待定" tab in /admin for human attention.
pending_when_unsure: true

# When an item is handle-only (no x_user_id resolved), still annotate but
# don't transition status. Identity-thin items have a higher false-match
# risk and the human deserves to look at them.
annotate_only_when_uid_missing: true
