name = "x-spam-sentinel-edge"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
# Cloudflare account for the public Worker deployment.
account_id = "cfab318ffd80d3f933cb6742534e88f3"

# Custom domain — public entry point. Requires the parent zone (`zuoluo.tv`)
# to be active in this Cloudflare account, and `workers_routes:write` on the
# API token (already present per `wrangler whoami`).
routes = [
  { pattern = "x.zuoluo.tv", custom_domain = true },
]

# Keep the auto-generated *.workers.dev URL alive so installs that still hold
# an old `edgeBase` setting continue to work during the migration window.
# Can be flipped to `false` once the extension has rolled out widely.
workers_dev = true

# Static assets — favicon set, mascot artwork, og:image. Cloudflare Workers
# Assets serves files from this directory first; unmatched paths fall through
# to the Hono router (so /, /list, /admin, /v1/* still work as routes).
[assets]
directory = "./static"
# `none` = static assets only for matching files; anything else hits Worker.
not_found_handling = "none"
# Don't auto-redirect /foo → /foo/ on directory-like requests; we serve
# images, not browseable subdirs.
html_handling = "none"

# D1 — curation source of truth. Create with:
#   npx wrangler d1 create xss-db
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "xss-db"
database_id = "c3a73f50-9af1-4b85-9b5b-db19dd33f175"

# No public [vars]. ALL LLM provider config lives in Worker secrets so the
# repo can stay public without doxxing the inference dependency:
#   npx wrangler secret put LLM_API_BASE    # OpenAI-compatible base URL
#   npx wrangler secret put LLM_API_MODEL   # model id
#   npx wrangler secret put LLM_API_KEY     # bearer token
#   npx wrangler secret put ADMIN_TOKEN     # /admin gate
# Optional:
#   npx wrangler secret put REQUIRE_AUTH         # "1" => /v1/classify requires GH login
#   npx wrangler secret put WHITELIST_SYNC_TOKEN # fine-grained PAT, Contents:Write on the repo
#   npx wrangler secret put WHITELIST_SYNC_REPO  # "owner/repo", default foru17/make-x-great-again

# Scheduled mirror of curated whitelist/blacklist to the repo.
# No-ops when WHITELIST_SYNC_TOKEN is unset; otherwise commits to
# data/whitelist/v1.json and data/blacklist/v1.json every 6h.
[triggers]
crons = ["0 */6 * * *"]

# R2 (published bloom/JSON artifact) — phase 2, uncomment when wiring publish:
# [[r2_buckets]]
# binding = "ARTIFACTS"
# bucket_name = "xss-blocklist"
